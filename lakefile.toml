name = "io"
defaultTargets = ["CatGT", "Theorem53", "ZeoliteCatGT"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.14.0"

[[lean_lib]]
name = "CatGT"
roots = ["CatGT.CatGT_Main"]

[[lean_lib]]
name = "Theorem53"
roots = ["PrincipiaOrthogona1.Theorem53NonCommutativity"]

# Added 2026-07-10: the zeolite operator-order paper's Lean files were sitting
# in Downloads, never wired into any lakefile, so the "6 closed / 3 admits"
# and "no sorry" claims made about them were never actually kernel-checked.
# This wires them in so CI has a real chance to check them for the first time.
# CatGT_v2.lean in particular is expected to have real compile issues (see
# zeolite_operator_order/CatGT_PROOFS_COMPLETE.lean's header/footer notes for
# the honest sorry-count audit of the companion proof file) -- a red build
# here is a useful, expected result, not a sign the wiring is wrong.
[[lean_lib]]
name = "ZeoliteCatGT"
roots = ["zeolite_operator_order.CatGT_PROOFS_COMPLETE", "zeolite_operator_order.CatGT_v2"]
