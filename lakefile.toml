name = "io"
defaultTargets = ["CatGT", "Theorem53"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.14.0"

# Every Lean library in this repository is kernel-checked with zero `sorry`.
# The incomplete zeolite operator-order formalizations (formerly the
# ZeoliteProofs / ZeoliteV2Stub targets) were removed on 2026-07-17: they
# carried 17 and 25 open `sorry`s respectively and only ever "passed" CI
# because `sorry` compiles. The zeolite operator-order result stands on its
# published algebraic proofs (zeolite_operator_order/ALGEBRAIC_PROOFS_ALL_7_THEOREMS.md
# and the accompanying paper); a Lean formalization of it is future work.

[[lean_lib]]
name = "CatGT"
roots = ["CatGT.CatGT_Main"]

[[lean_lib]]
name = "Theorem53"
roots = ["PrincipiaOrthogona1.Theorem53NonCommutativity"]
