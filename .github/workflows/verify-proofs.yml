name: Verify Lean proofs (real kernel check)

on:
  push:
    branches: [main]
    paths: ["**.lean", "lakefile.toml", "lean-toolchain", ".github/workflows/verify-proofs.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}

      - name: lake update
        run: lake update

      # CatGT and Theorem53 have zero imports between them - build and check
      # each independently so a failure in one doesn't hide the other's result.

      - name: Build CatGT
        id: build_catgt
        continue-on-error: true
        run: lake build CatGT

      - name: Print axioms - CatGT
        if: steps.build_catgt.outcome == 'success'
        run: |
          cat > /tmp/CheckCatGT.lean <<'LEAN'
          import CatGT.CatGT_Main
          #print axioms helical_selectivity
          #print axioms criticalRadius_pos
          #print axioms criticalRadius_antitone
          #print axioms selectivityFactor_eq
          #print axioms ipr_between_zero_and_one
          #print axioms reeb_orbit_is_integral
          LEAN
          lake env lean /tmp/CheckCatGT.lean

      - name: Build Theorem53
        id: build_theorem53
        continue-on-error: true
        run: lake build Theorem53

      - name: Print axioms - Theorem53
        if: steps.build_theorem53.outcome == 'success'
        run: |
          cat > /tmp/CheckTheorem53.lean <<'LEAN'
          import PrincipiaOrthogona1.Theorem53NonCommutativity
          open Theorem53NonCommutativity
          #print axioms nonCommutativity_instance
          #print axioms nonCommutativity_nondegenerate
          #print axioms commuting_instance
          #print axioms not_forall_order_dependent
          #print axioms thm_5_3_is_exactly_existential
          LEAN
          lake env lean /tmp/CheckTheorem53.lean

      - name: Build ZeoliteProofs
        id: build_zeolite_proofs
        continue-on-error: true
        run: lake build ZeoliteProofs

      - name: Print axioms - ZeoliteProofs
        if: steps.build_zeolite_proofs.outcome == 'success'
        run: |
          cat > /tmp/CheckZeoliteProofs.lean <<'LEAN'
          import zeolite_operator_order.CatGT_PROOFS_COMPLETE
          open CatGT
          #print axioms NonCommutativity
          #print axioms ZSM5_SupportsAromatics
          #print axioms MCM22_PermitsAromatics
          #print axioms MainTheorem_OperatorOrderDeterminesSelectivity
          #print axioms ContactMorphismScaling
          #print axioms Prediction1_DRIFTS_Sequence
          #print axioms Prediction2_CokeSpatialSegregation
          #print axioms Prediction3_AcidSiteRelocation
          #print axioms Selectivity_Bijection_With_OperatorOrder
          LEAN
          lake env lean /tmp/CheckZeoliteProofs.lean

      # CatGT_v2.lean is a known, explicitly-labeled theorem-stub file (every
      # proof body is `sorry`, some helper predicates are referenced before
      # their definitions). We still build it in CI so the failure is real
      # and visible in logs, but it does not gate overall pass/fail below --
      # unlike CatGT/Theorem53/ZeoliteProofs, nothing has ever claimed this
      # file's theorems are complete, so a red step here is expected and is
      # not swept under the rug -- it's just not treated as a regression.
      - name: Build ZeoliteV2Stub (expected to fail - stub file, not gating)
        id: build_zeolite_v2
        continue-on-error: true
        run: lake build ZeoliteV2Stub

      - name: Fail workflow if a claimed-complete target failed
        if: steps.build_catgt.outcome != 'success' || steps.build_theorem53.outcome != 'success' || steps.build_zeolite_proofs.outcome != 'success'
        run: |
          echo "CatGT build: ${{ steps.build_catgt.outcome }}"
          echo "Theorem53 build: ${{ steps.build_theorem53.outcome }}"
          echo "ZeoliteProofs build: ${{ steps.build_zeolite_proofs.outcome }}"
          echo "ZeoliteV2Stub build (informational, non-gating): ${{ steps.build_zeolite_v2.outcome }}"
          exit 1
