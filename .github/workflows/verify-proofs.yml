name: Verify proofs

# Real kernel verification on every push.
# Fixed 2026-07: this file previously contained Lean source (a stray
# copy of Theorem53NonCommutativity.lean), so GitHub Actions had no
# valid workflow and CI never ran. This is the actual workflow.
#
# Gating targets: CatGT, Theorem53.
# Non-gating: ZeoliteProofs (CatGT_PROOFS_COMPLETE.lean surfaced ~30
# real errors on its first-ever kernel check, run #28 -- reserved
# lambda tokens, unknown identifiers, unsolved goals, one sorry; it
# stays visible in CI but does not gate until repaired) and
# ZeoliteV2Stub (explicit stub, every body is sorry).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The repo has no committed lake-manifest.json, so generate one.
      # elan reads ./lean-toolchain to pick the pinned Lean version.
      - name: Install elan and generate manifest
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          ~/.elan/bin/lake update

      # Restores the Mathlib build cache and runs lake build for the
      # gating targets. A failure in CatGT or Theorem53 fails the
      # workflow.
      - uses: leanprover/lean-action@v1
        with:
          build-args: "CatGT Theorem53"

      - name: Build ZeoliteProofs (non-gating, open repair -- see run 28)
        continue-on-error: true
        run: lake build ZeoliteProofs

      - name: Build ZeoliteV2Stub (non-gating, expected to fail)
        continue-on-error: true
        run: lake build ZeoliteV2Stub
