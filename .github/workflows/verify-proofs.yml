name: Verify proofs

# Real kernel verification on every push.
# Fixed 2026-07: this file previously contained Lean source (a stray
# copy of Theorem53NonCommutativity.lean), so GitHub Actions had no
# valid workflow and CI never ran. This is the actual workflow.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs elan, restores the Mathlib build cache, and runs
      # lake build for the gating targets. A failure in any of
      # CatGT / Theorem53 / ZeoliteProofs fails the workflow.
      - uses: leanprover/lean-action@v1
        with:
          build-args: "CatGT Theorem53 ZeoliteProofs"

      # ZeoliteV2Stub is an explicit theorem-stub file (every body is
      # sorry). It is built for visibility but does not gate pass/fail
      # -- see the note in lakefile.toml.
      - name: Build ZeoliteV2Stub (non-gating, expected to fail)
        continue-on-error: true
        run: ~/.elan/bin/lake build ZeoliteV2Stub
