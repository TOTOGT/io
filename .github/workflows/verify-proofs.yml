# Real kernel verification on every push.
#
# Gating targets: CatGT, Theorem53. Each has a FULLY INDEPENDENT build +
# #print axioms + pass/fail gate -- a failure in one cannot block, hide, or
# skip another's result. This matters specifically for Theorem53 (Theorem 5.3,
# Non-Commutativity): this repo exists to give it a clean citation target
# isolated from AXLE and the rest of PrincipiaVol1's legacy breakage, so its
# green/red status must never depend on CatGT. Before 2026-07-12 both were
# built in one combined lean-action step, so a CatGT break would silently stop
# Theorem53's #print axioms from ever running. Split into two independent
# lean-action@v1 invocations (each still gets Mathlib's precompiled
# `lake exe cache get`, so this costs no real build time).
#
# `#print axioms` is how a "closed · 0 sorry" claim gets checked at the kernel
# level rather than by eye: a theorem with no sorry in its own body can still
# inherit `sorryAx` transitively from something it calls, which only
# #print axioms surfaces. These steps are informational (never fail the build).
#
# 2026-07-18: ZeoliteProofs and ZeoliteV2Stub targets REMOVED. Those files
# (CatGT_PROOFS_COMPLETE.lean, CatGT_v2.lean) carried 17 and 25 open sorries
# and only ever "passed" because `sorry` compiles. Deleted so that every Lean
# file this repo builds is genuinely 0-sorry. The zeolite operator-order result
# now stands on its published algebraic derivations; see
# zeolite_operator_order/OPERATOR_ORDER_DERIVATIONS_AND_STATUS.md.
# Also migrated v4.14.0 -> v4.33: `Complex.abs` no longer exists in current
# Mathlib, so CatGT_Main.lean now uses the norm `‖·‖`.

name: Verify Lean proofs (real kernel check)

on:
  push:
    branches: [main]
    paths: ["**.lean", "lakefile.toml", "lean-toolchain", ".github/workflows/verify-proofs.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build CatGT
        id: build_catgt
        continue-on-error: true
        uses: leanprover/lean-action@v1
        with:
          build-args: "CatGT"

      - name: Print axioms - CatGT
        if: steps.build_catgt.outcome == 'success'
        continue-on-error: true
        run: |
          cat > /tmp/CheckCatGT.lean <<'LEAN'
          import CatGT.CatGT_Main
          #print axioms ipr_between_zero_and_one
          #print axioms criticalRadius_pos
          #print axioms criticalRadius_antitone
          #print axioms helical_selectivity
          #print axioms selectivityFactor_eq
          #print axioms reeb_orbit_advances
          #print axioms dnlsNorm_nonneg
          #print axioms catgt_dm3_disk
          #print axioms ensemble_scaling_forms_diverge
          LEAN
          lake env lean /tmp/CheckCatGT.lean

      - name: Build Theorem53
        id: build_theorem53
        continue-on-error: true
        uses: leanprover/lean-action@v1
        with:
          build-args: "Theorem53"

      - name: Print axioms - Theorem53
        if: steps.build_theorem53.outcome == 'success'
        continue-on-error: true
        run: |
          cat > /tmp/CheckTheorem53.lean <<'LEAN'
          import PrincipiaOrthogona1.Theorem53NonCommutativity
          open Theorem53NonCommutativity
          #print axioms nonCommutativity_instance
          #print axioms nonCommutativity_nondegenerate
          #print axioms commuting_instance
          #print axioms not_forall_order_dependent
          #print axioms thm_5_3_is_exactly_existential
          LEAN
          lake env lean /tmp/CheckTheorem53.lean

      - name: Fail workflow if a gating target failed
        if: steps.build_catgt.outcome != 'success' || steps.build_theorem53.outcome != 'success'
        run: |
          echo "CatGT build: ${{ steps.build_catgt.outcome }}"
          echo "Theorem53 build: ${{ steps.build_theorem53.outcome }}"
          exit 1
